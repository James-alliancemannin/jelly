<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Data Leak Check • Aspen Meridian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-8">

<div class="max-w-2xl mx-auto">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold">DEBUG VERSION - FULL VERCEL SUBDOMAIN</h1>
        <p class="text-emerald-400">If you see this text, you have the latest file</p>
    </div>

    <div class="bg-zinc-900 p-10 rounded-3xl">
        <form id="leak-form">
            <input type="email" id="email" value="account-exists@hibp-integration-tests.com" class="w-full p-4 rounded-xl bg-zinc-800 mb-6">
            <div class="g-recaptcha" data-sitekey="6LcQI34sAAAAALuDqFMT5cbiRy-CIVrxp477-5xz"></div>
            <button type="submit" class="w-full mt-6 bg-red-600 py-6 rounded-3xl text-xl font-bold">TEST API CALL</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('leak-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;

        alert("Sending to https://am-amber.vercel.app/api/check-leak ...");

        const res = await fetch('https://am-amber.vercel.app/api/check-leak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, recaptchaToken: grecaptcha.getResponse() })
        });

        const text = await res.text();
        alert(`Status: ${res.status}\n\nResponse:\n${text.substring(0, 500)}`);
    });
</script>
</body>
</html>
